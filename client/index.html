<!doctype html><!--Declares this file as an HTML5 document-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/apple-touch-icon.png" /><!--Defines the favicon-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>Ruth Store</title>
    <meta name="description" content="Shop unique gifts, greeting cards, ornaments, and collectibles at Ruth Store. Perfect for every occasion." />
    <meta name="author" content="Ruth Store" />

    <!-- Open Graph for Social Sharing -->
    <meta property="og:title" content="Ruth Store – Gifts & Cards" />
    <meta property="og:description" content="Explore unique gifts and personalized greeting cards at Ruth Store." />
    <meta property="og:image" content="/banner-thumbnail.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ruth Store" />
    <meta name="twitter:description" content="Find perfect gifts and cards at Ruth Store." />
    <meta name="twitter:image" content="/banner-thumbnail.png" />

    <!-- Mobile Theme Color -->
    <meta name="theme-color" content="#ffffff" />
  </head>

  <body>
    <div id="root"></div><!--empty container. React will mount your app here (in main.jsx).React renders.-->
    <script type="module" src="/src/main.jsx"></script><!--loads your entry JavaScript.-->
    <script src="/nav-indicator.js" defer></script>
    <script src="/ui-a11y.js" defer></script>
    <script src="/footer-animate.js" defer></script>
  </body>
</html>
